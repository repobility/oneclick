<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" />
    <title>OneClick — link is gone</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1><span class="icon">🔗</span> OneClick</h1>
      </header>

      <section class="card error-card">
        <h2>This link is gone</h2>
        <p class="muted">
          It has already been opened, expired, or never existed. By design, we cannot recover it.
        </p>
        <a href="/" class="ghost as-button">Create your own</a>
      </section>
    </main>
  </body>
</html>
