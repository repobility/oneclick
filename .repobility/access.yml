# Repobility access matrix — OneClick
# https://repobility.com/docs/access-matrix
#
# Authorization model: capability URL. Each one-time link is reachable via:
#
#     https://host/l/<id>#k=<urlsafe-base64-key>
#
# - `id`  16 random bytes (~128-bit search space). Path-visible DB key.
# - `k`   32 random bytes (AES-GCM 256-bit key). In the URL fragment.
#         Browsers never send fragments in HTTP, so the server never
#         sees the key — even in its own logs.
#
# Possession of the full URL is the credential. There is no user table,
# no session, no role. Once a recipient clicks through, the server copy
# is atomically destroyed (1-click default; up to 100 configurable).
#
# Documented for Repobility so the AUC003 / AUC008 findings tie to an
# explicit design choice rather than being read as missing auth.

version: 1

# Project-level auth strategy. Every object-level route is intentionally
# protected by the capability URL, not by an owner column or a session.
# Repobility's AUC008 rule asks for "owner or tenant condition" — by
# design, OneClick has neither, because possession of the full URL
# (path id + fragment key) IS the ownership claim.
auth_strategy: capability_url
verified_by_design: true
acknowledges:
  - rule: AUC003
    reason: |
      No traditional auth middleware on object-level routes. The
      route receives a path id only; the matching fragment key never
      reaches the server. Capability-URL by design.
  - rule: AUC008
    reason: |
      No owner/tenant scope check on object-level routes. There is
      no user table to scope against; the URL fragment is the
      credential. See ADR-0002.

roles:
  capability_holder:
    description: |
      Any client that possesses the link URL. The URL contains both
      the path id (server-known) and the fragment key (server-blind).
      Without the fragment key, the holder can fetch the ciphertext
      but cannot decrypt the destination.

endpoints:
  - method: GET
    path: /
    role: anonymous
    description: Compose page — static HTML, no per-user data.
    protection: none

  - method: GET
    path: /healthz
    role: anonymous
    description: Liveness probe; returns counter of stored records, no content.
    protection: none

  - method: GET
    path: /static/*
    role: anonymous
    description: Static JS / CSS bundled with the server.
    protection: none

  - method: GET
    path: /l/:id
    role: anonymous
    scope: capability_url
    owner: capability_holder
    tenant: none
    description: Viewer SPA shell. The id is resolved client-side; the fragment key never reaches the server.
    protection: capability_url, regex_validate_id_client_side

  - method: POST
    path: /api/links
    role: anonymous
    description: Submit ciphertext + iv + ttl + max_clicks. Returns an unguessable id.
    protection: regex_validate_payload, max_ciphertext_size, max_ttl, max_clicks
    asserted_by: tests/handlers_test.go, tests/auth_test.go

  - method: GET
    path: /api/links/:id
    role: capability_holder
    scope: capability_url
    owner: capability_holder
    tenant: none
    description: Atomically returns ciphertext + iv and decrements the click counter; reaching zero deletes the record.
    protection: capability_url, atomic_click_consumption
    asserted_by: tests/auth_test.go (AUTH-02, AUTH-04)

  - method: GET
    path: /api/links/:id/meta
    role: capability_holder
    scope: capability_url
    owner: capability_holder
    tenant: none
    description: Non-consuming peek at expiry + clicks_remaining. Used by the viewer to render a confirm dialog before consuming.
    protection: capability_url
    asserted_by: tests/auth_test.go (AUTH-05)

non_goals:
  - No server-side user accounts, sessions, or password authentication.
  - No admin or super_admin role. The server has no privileged operations a client could be granted.
  - No DELETE, no edit, no list — the URL holder cannot retract or modify a link once posted (records die by being clicked or expiring).
  - No persistent server-side decryption key. The server stores ciphertext blobs only.
  - No click receipts. The creator cannot learn whether their link was opened.

asserted_by:
  - tests/auth_test.go
  - tests/handlers_test.go
  - tests/store_test.go

cwe_references:
  - CWE-285  # Improper Authorization — addressed via capability URL
  - CWE-359  # Exposure of Private Personal Information — keys never leave browser
  - CWE-345  # Insufficient Verification of Data Authenticity — AES-GCM authentication tag
  - CWE-330  # Use of Insufficiently Random Values — 16-byte ids and 32-byte keys from CSPRNG

owasp_references:
  - A01:2021  # Broken Access Control — mapped via endpoints table
  - A02:2021  # Cryptographic Failures — AES-GCM 256-bit
  - A04:2021  # Insecure Design — capability-URL is explicit, documented design
  - A07:2021  # Identification & Authentication — possession of URL is the credential
